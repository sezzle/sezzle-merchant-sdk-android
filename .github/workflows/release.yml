name: Release

on:
  push:
    tags: ['*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build release AAR
        run: ./gradlew :sezzle-sdk:assembleRelease

      - name: Rename AAR
        run: cp sezzle-sdk/build/outputs/aar/sezzle-sdk-release.aar sezzle-sdk/build/outputs/aar/sezzle-merchant-sdk-${{ github.ref_name }}.aar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            sezzle-sdk/build/outputs/aar/sezzle-merchant-sdk-${{ github.ref_name }}.aar
